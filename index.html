  <body style="background-color: black; color: white">
    <br />
    <div style="text-align: center; font-size: 40px">~ ปฏิทินวันพระ ~</div>
    <br /><br />

          onchange="เปลี่ยนปี()"

      <tr>

      <tr>

        <td></td>

    <br /><br />
    <div style="display: grid; grid-template-columns: 1fr 1fr">
      <i
        class="fa-regular fa-circle-left"
        style="font-size: 40px; text-align: left"
        onclick="กดซ้าย()"
      ></i>
      <i
        class="fa-regular fa-circle-right"
        style="font-size: 40px; text-align: right"
        onclick="กดขวา()"
      ></i>
    </div>

    <script>
      var เดือนล่าสุด;
      var ปีล่าสุด;
      var กล่องเดือน = [
        "มกราคม",
        "กุมภาพันธ์",
        "มีนาคม",
        "เมษายน",
        "พฤษภาคม",
        "มิถุนายน",
        "กรกฎาคม",
        "สิงหาคม",
        "กันยายน",
        "ตุลาคม",
        "พฤศจิกายน",
        "ธันวาคม",
      ];

      // ข้อมูลวันพระในแต่ละปี
      var วันพระ = {
        2024: {
          0: [4, 10, 18, 25], // มกราคม
          1: [2, 19, 17, 24], // กุมภาพันธ์
          2: [3, 19, 17, 24],
          3: [1, 8, 16, 23],
          4: [1, 7, 15, 22, 30],
          5: [6, 14, 21, 29],
          6: [5, 13, 20, 21, 28],
          7: [4, 12, 19, 27],
          8: [2, 10, 17, 25],
          9: [2, 10, 17, 25, 31],
          10: [8, 15, 23, 30],
          11: [2, 15, 23, 29],
        },
        2025: {
          0: [6, 13, 21, 28], // มกราคม
          1: [5, 12, 20, 26], // กุมภาพันธ์
          2: [6, 13, 21, 28],
          3: [5, 12, 20, 26],
          4: [4, 11, 19, 26],
          5: [3, 10, 18, 25],
          6: [3, 10, 18, 25],
          7: [2, 9, 17, 23, 31],
          8: [7, 15, 22, 30],
          9: [7, 15, 21, 29],
          10: [5, 13, 20, 28],
          11: [5, 13, 19, 27],
        },
        2026: {
          0: [5, 12, 19, 26], // มกราคม
          1: [3, 10, 17, 24], // กุมภาพันธ์
          2: [3, 10, 17, 24],
          3: [3, 10, 17, 24],
          4: [3, 10, 17, 24],
          5: [3, 10, 17, 24],
          6: [3, 10, 17, 24],
          7: [3, 10, 17, 24],
          8: [3, 10, 17, 24],
          9: [3, 10, 17, 24],
          10: [3, 10, 17, 24],
          11: [3, 10, 17, 24],
        },
      };

      function วันเดือนปีปัจจุบัน() {
        let ปัจจุบัน = new Date();
        เดือนล่าสุด = ปัจจุบัน.getMonth();
        ปีล่าสุด = ปัจจุบัน.getFullYear();
        สร้างดรอปดาวน์ปี();
        รันวันที่(เดือนล่าสุด, ปีล่าสุด);
      }

      function สร้างดรอปดาวน์ปี() {
        let dropdown = document.getElementById("ช่องแสดงปี");
        dropdown.innerHTML = "";
        Object.keys(วันพระ).forEach((ปี) => {
          let option = document.createElement("option");
          option.value = ปี;
          option.text = parseInt(ปี) + 543;
          dropdown.appendChild(option);
        });
        dropdown.value = ปีล่าสุด;
      }

      function ลบข้อมูลเก่า() {
        for (let i = 1; i <= 37; i++) {
          let cell = document.getElementById("d" + i);
          cell.innerHTML = "";
          cell.style.backgroundColor = "";
        }
      }

      function รันวันที่(เดือน, ปี) {
        let วันเริ่มต้น = new Date(ปี, เดือน, 1).getDay();
        let จำนวนวัน = new Date(ปี, เดือน + 1, 0).getDate();
        ลบข้อมูลเก่า();
        แสดงเดือน();
        for (let i = 1; i <= จำนวนวัน; i++) {
          document.getElementById("d" + (วันเริ่มต้น + i)).innerHTML = i;
        }
        แสดงวันพระ(วันเริ่มต้น, เดือน, ปี);
      }

      function แสดงเดือน() {
        document.getElementById("ช่องแสดงเดือน").innerHTML =
          กล่องเดือน[เดือนล่าสุด] + "&nbsp";
      }

      function แสดงวันพระ(เศษเกิน, เดือน, ปี) {
        let ปีข้อมูล = วันพระ[ปี] || [];
        let วันพระในเดือน = ปีข้อมูล[เดือน] || [];
        วันพระในเดือน.forEach((วัน) => {
          if (วัน) {
            document.getElementById(
              "d" + (parseInt(วัน) + เศษเกิน)
            ).style.backgroundColor = "#CD7F32";
          }
        });
      }

      function เปลี่ยนปี() {
        ปีล่าสุด = parseInt(document.getElementById("ช่องแสดงปี").value);
        รันวันที่(เดือนล่าสุด, ปีล่าสุด);
      }

      function กดขวา() {
        if (เดือนล่าสุด < 11) {
          เดือนล่าสุด++;
          รันวันที่(เดือนล่าสุด, ปีล่าสุด);
        }
      }

      function กดซ้าย() {
        if (เดือนล่าสุด > 0) {
          เดือนล่าสุด--;
          รันวันที่(เดือนล่าสุด, ปีล่าสุด);
        }
      }

      วันเดือนปีปัจจุบัน();
    </script>
  </body>
